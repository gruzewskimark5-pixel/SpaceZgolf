version: "3.9"

services:

  kernel:
    build: ./kernel
    container_name: horizon-kernel
    ports:
      - "8000:8000"
    volumes:
      - ./data/doctrine:/app/doctrine
      - ./data/memory:/app/memory
    restart: unless-stopped

  viewer:
    build: ./viewer
    container_name: horizon-viewer
    ports:
      - "3000:3000"
    depends_on:
      - kernel
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    container_name: horizon-proxy
    ports:
      - "80:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - viewer
      - kernel
    restart: unless-stopped
