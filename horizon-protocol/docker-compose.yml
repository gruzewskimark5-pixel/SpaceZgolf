version: "3.9"

services:
  kernel:
    build: ./kernel
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

  viewer:
    build: ./viewer
    ports:
      - "3000:80"
    depends_on:
      - kernel

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - kernel
      - viewer
